# IDU extended status registers (1011–1042) — indoor unit detailed telemetry
# scan_interval: 30 seconds
# Note: register 1010 (IDU load output, all bits reserved) is intentionally skipped.
# Note: 0x7F (127) in temperature registers indicates a sensor error.

- name: clivet_t1_primary_outlet
  address: 1011
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  unique_id: clivet_t1_primary_outlet
  scan_interval: 30
  # Register 1011 — T1 primary water outlet temperature °C (0x7F = sensor error)

