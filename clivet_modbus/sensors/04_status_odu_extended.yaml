# ODU extended status registers (130–147)
# scan_interval: 30 seconds

- name: clivet_idu_software_version
  address: 130
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unique_id: clivet_idu_software_version
  scan_interval: 30
  # Register 130 — IDU (indoor unit) software version 0–99

- name: clivet_ui_software_version
  address: 131
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unique_id: clivet_ui_software_version
  scan_interval: 30
  # Register 131 — UI (user interface) software version 0–99

- name: clivet_target_frequency
  address: 132
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "Hz"
  device_class: frequency
  unique_id: clivet_target_frequency
  scan_interval: 30
  # Register 132 — Target compressor frequency Hz (compare with register 100 for actual frequency)

- name: clivet_dc_bus_current
  address: 133
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "A"
  device_class: current
  unique_id: clivet_dc_bus_current
  scan_interval: 30
  # Register 133 — DC bus current A

- name: clivet_dc_bus_voltage
  address: 134
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 10
  precision: 1
  unit_of_measurement: "V"
  device_class: voltage
  unique_id: clivet_dc_bus_voltage
  scan_interval: 30
  # Register 134 — DC bus voltage V; raw = actual / 10, so scale = 10 to recover actual value

