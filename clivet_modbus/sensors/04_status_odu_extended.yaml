  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  unique_id: clivet_curve1_t1s_output
  scan_interval: 30
  # Register 136 — Heating curve 1 calculated T1S output flow temperature °C (Zone 1)

- name: clivet_curve2_t1s_output
