# IDU main status registers (1000–1006) — indoor unit live readings
# scan_interval: 30 seconds

# ─────────────────────────────────────────────────────────────────────────────
# SCAN INTERVAL — edit the value below to change the poll rate for ALL sensors
# in this file. (YAML anchor; referenced as *scan_interval throughout)
# ─────────────────────────────────────────────────────────────────────────────

- name: idu_operation_mode
  address: 1000
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  scan_interval: &scan_interval 15   # ← change this value to repoll all sensors
  unique_id: idu_operation_mode
  # Register 1000 — IDU operating mode: 0=OFF, 2=COOL, 3=HEAT

- name: com_rps_compressor
  address: 1001
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "Hz"
  device_class: frequency
  scan_interval: *scan_interval
  unique_id: com_rps_compressor
  # Register 1001 — Com. rps compressor speed reported from IDU telemetry Hz

- name: twi_water_inlet
  address: 1002
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: twi_water_inlet
  # Register 1002 — Twi water inlet temperature °C (IDU side)

- name: two_water_outlet
  address: 1003
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: two_water_outlet
  # Register 1003 — Two water outlet temperature °C (IDU side)

- name: tsolar_idu
  address: 1004
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: tsolar_idu
  # Register 1004 — Tsolar solar panel temperature °C as seen by IDU (solar kit only)

- name: slave_unit_error_code
  address: 1005
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  scan_interval: *scan_interval
  unique_id: slave_unit_error_code
  # Register 1005 — Slave unit error code (cascade / multi-unit installations)

- name: p6_error
  address: 1006
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  scan_interval: *scan_interval
  unique_id: p6_error
  # Register 1006 — P6 error code (reserved; may always read 0)
