# ODU main status registers (100–127) — outdoor unit live readings
# scan_interval: 30 seconds

# ─────────────────────────────────────────────────────────────────────────────
# SCAN INTERVAL — edit the value below to change the poll rate for ALL sensors
# in this file. (YAML anchor; referenced as *scan_interval throughout)
# ─────────────────────────────────────────────────────────────────────────────

- name: operating_frequency
  address: 100
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "Hz"
  device_class: frequency
  scan_interval: &scan_interval 15   # ← change this value to repoll all sensors
  unique_id: operating_frequency
  # Register 100 — Compressor operating frequency Hz; 0 = compressor off

- name: operating_mode
  address: 101
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  scan_interval: *scan_interval
  unique_id: operating_mode
  # Register 101 — ODU operating mode: 0=OFF, 2=COOL, 3=HEAT
  # Note: Swedish manual has a printing error for this register
  # See templates/08_combined_sensors.yaml for decoded mode name sensor

- name: fan_speed
  address: 102
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "rpm"
  scan_interval: *scan_interval
  unique_id: fan_speed
  # Register 102 — ODU fan speed rpm

- name: pmv_opening
  address: 103
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "pulses"
  scan_interval: *scan_interval
  unique_id: pmv_opening
  # Register 103 — PMV/EXV electronic expansion valve opening in pulses (steps of 8 only)

- name: tw_in
  address: 104
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: tw_in
  # Register 104 — TW_in water inlet temperature °C (return from the hydronic system)

- name: tw_out
  address: 105
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: tw_out
  # Register 105 — TW_out water outlet temperature °C (supply to the hydronic system)

- name: t3_condenser
  address: 106
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: t3_condenser
  # Register 106 — T3 condenser/coil temperature °C (NOT outdoor ambient on this unit)

- name: t4_outdoor_ambient
  address: 107
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: t4_outdoor_ambient
  # Register 107 — T4 outdoor ambient air temperature °C

- name: tp_discharge_gas
  address: 108
