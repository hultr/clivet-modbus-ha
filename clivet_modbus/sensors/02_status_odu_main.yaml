  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: tp_discharge_gas
  # Register 108 — Tp exhaust/discharge gas temperature °C (values >120°C indicate a problem)

- name: th_suction_gas
  address: 109
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: th_suction_gas
  # Register 109 — Th return/suction gas temperature °C (used for superheat calculation)

- name: t1_backup_heater_outlet
  address: 110
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
