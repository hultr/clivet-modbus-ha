# ODU main status registers (100–127) — outdoor unit live readings
# scan_interval: 30 seconds

- name: clivet_operating_frequency
  address: 100
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "Hz"
  device_class: frequency
  unique_id: clivet_operating_frequency
  scan_interval: 30
  # Register 100 — Compressor operating frequency Hz; 0 = compressor off

- name: clivet_operating_mode
  address: 101
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unique_id: clivet_operating_mode
  scan_interval: 30
  # Register 101 — ODU operating mode: 0=OFF, 2=COOL, 3=HEAT
  # Note: Swedish manual has a printing error for this register
  # See templates/08_combined_sensors.yaml for decoded mode name sensor

- name: clivet_fan_speed
  address: 102
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "rpm"
  unique_id: clivet_fan_speed
  scan_interval: 30
  # Register 102 — ODU fan speed rpm

- name: clivet_pmv_opening
  address: 103
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 1
  precision: 0
  unit_of_measurement: "pulses"
  unique_id: clivet_pmv_opening
  scan_interval: 30
  # Register 103 — PMV/EXV electronic expansion valve opening in pulses (steps of 8 only)

- name: clivet_tw_in
  address: 104
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  unique_id: clivet_tw_in
  scan_interval: 30
  # Register 104 — TW_in water inlet temperature °C (return from the hydronic system)

- name: clivet_tw_out
