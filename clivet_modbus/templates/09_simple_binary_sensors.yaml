# Simple binary sensors derived from basic threshold checks

- binary_sensor:
    - name: "HP Fan Running"
      unique_id: bin_fan_running
      # Fan is running when ODU fan speed > 0 RPM
      # Register 102 — returns unavailable if sensor not reporting
      state: >-
        {% if states('sensor.hp_fan_speed') | int(none) is not none %}
          {{ (states('sensor.hp_fan_speed') | int(0)) > 0 }}
        {% else %}
          unavailable
        {% endif %}
      device_class: running
      icon: "mdi:fan"

    - name: "HP Power to ODU"
      unique_id: bin_power_to_odu
      # ODU has power when AC current draw > 0 A (indicates compressor/system is active)
      # Register 118 — returns unavailable if sensor not reporting
      state: >-
        {% if states('sensor.hp_odu_current') | int(none) is not none %}
          {{ (states('sensor.hp_odu_current') | int(0)) > 0 }}
        {% else %}
          unavailable
        {% endif %}
      device_class: running
      icon: "mdi:power-plug"

    - name: "HP Holiday Away"
      unique_id: bin_holiday_away
      # Register 5, BIT5 — Holiday away mode active (read-only; set internally by controller)
      state: "{{ (states('sensor.hp_function_register') | int(0)) | bitwise_and(32) != 0 }}"
      icon: "mdi:home-export-outline"

    - name: "HP Holiday Home"
      unique_id: bin_holiday_home
      # Register 5, BIT8 — Holiday home mode active (read-only; set internally by controller)
      state: "{{ (states('sensor.hp_function_register') | int(0)) | bitwise_and(256) != 0 }}"
      icon: "mdi:home-import-outline"
