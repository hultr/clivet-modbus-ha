# Template switches for register 0 — ON/OFF enable bitmask
# Uses read-modify-write pattern to set/clear individual bits.
# Source sensor: sensor.clivet_onoff_register
#
# BIT0 = TS  — Room thermostat control
# BIT1 = T1S — Zone 1 water flow temperature control
# BIT2 = T5S — DHW (domestic hot water) heating
# BIT3 = T2S — Zone 2 water flow temperature control

- switch:
    - name: "Clivet Room Thermostat Enable (TS)"
      unique_id: clivet_switch_onoff_ts
      # Register 0, BIT0 — Room thermostat (TS) space heating/cooling ON/OFF
      state: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(1) != 0 }}"
      turn_on:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_or(1) }}"
      turn_off:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(65534) }}"
          # clear_mask = 65535 ^ (1 << 0) = 65534

    - name: "Clivet Zone 1 Heating Enable (T1S)"
      unique_id: clivet_switch_onoff_t1s
      # Register 0, BIT1 — Zone 1 water flow temperature control (T1S) ON/OFF
      state: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(2) != 0 }}"
      turn_on:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_or(2) }}"
      turn_off:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(65533) }}"
          # clear_mask = 65535 ^ (1 << 1) = 65533

    - name: "Clivet DHW Enable (T5S)"
      unique_id: clivet_switch_onoff_t5s
      # Register 0, BIT2 — DHW (domestic hot water) tank heating (T5S) ON/OFF
      state: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(4) != 0 }}"
      turn_on:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_or(4) }}"
      turn_off:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(65531) }}"
          # clear_mask = 65535 ^ (1 << 2) = 65531

    - name: "Clivet Zone 2 Heating Enable (T2S)"
      unique_id: clivet_switch_onoff_t2s
      # Register 0, BIT3 — Zone 2 water flow temperature control (T2S) ON/OFF (2-zone kit only)
      state: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(8) != 0 }}"
      turn_on:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_or(8) }}"
      turn_off:
        action: modbus.write_register
        data:
          hub: clivet_hp
          unit: 1
          address: 0
          value: "{{ (states('sensor.clivet_onoff_register') | int(0)) | bitwise_and(65527) }}"
          # clear_mask = 65535 ^ (1 << 3) = 65527
