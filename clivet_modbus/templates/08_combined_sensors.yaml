# Combined / derived template sensors
# These sensors combine multiple raw Modbus registers or decode enumerated values.

- sensor:
    - name: "HP Total Electrical Consumption"
      unique_id: tpl_total_electrical_consumption
      # Registers 143 (high) + 144 (low) — 32-bit electrical energy counter
      # Unit depends on the unit's firmware; typically kWh. Verify against physical display.
      state: >-
        {{ (states('sensor.hp_electrical_high_bits') | int(0)) * 65536
           + (states('sensor.hp_electrical_low_bits') | int(0)) }}
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "HP Total Heat Energy Produced"
      unique_id: tpl_total_heat_energy
      # Registers 145 (high) + 146 (low) — 32-bit heat energy counter
      # Unit depends on the unit's firmware; typically kWh. Verify against physical display.
      state: >-
        {{ (states('sensor.hp_heat_energy_high_bits') | int(0)) * 65536
           + (states('sensor.hp_heat_energy_low_bits') | int(0)) }}
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "HP ODU Operating Mode Name"
      unique_id: tpl_odu_mode_name
      # Register 101 — ODU mode decoded to a human-readable string
      # 0=OFF, 2=COOL, 3=HEAT (note: value 1 is not used; Swedish manual has a printing error)
      state: >-
        {% set mode = states('sensor.hp_operating_mode') | int(-1) %}
        {% if mode == 0 %}OFF
        {% elif mode == 2 %}COOL
        {% elif mode == 3 %}HEAT
        {% else %}Unknown ({{ mode }})
        {% endif %}

    - name: "HP Mode Command Name"
      unique_id: tpl_mode_command_name
      # Register 1 — Mode setpoint decoded to a human-readable string
      # 1=Auto, 2=Cooling, 3=Heating
      state: >-
        {% set mode = states('sensor.hp_mode_setting') | int(-1) %}
        {% if mode == 1 %}Auto
        {% elif mode == 2 %}Cooling
        {% elif mode == 3 %}Heating
        {% else %}Unknown ({{ mode }})
        {% endif %}

    - name: "HP IDU Capacity Combined"
      unique_id: tpl_idu_capacity_combined
      # Registers 1023 (high) + 1024 (low) — 32-bit IDU capacity value divided by 100 for kW
      state: >-
        {{ ((states('sensor.hp_idu_capacity_high_bits') | int(0)) * 65536
            + (states('sensor.hp_idu_capacity_low_bits') | int(0))) / 100 | round(2) }}
      unit_of_measurement: "kW"
      device_class: power

    - name: "HP Water Temperature Delta"
      unique_id: tpl_water_delta_temp
      # Register 105 (outlet) - Register 104 (inlet) = ΔT for heat calculations
      state: >-
        {% set outlet = states('sensor.hp_hydronic_supply_temperature') | float(none) %}
        {% set inlet = states('sensor.hp_hydronic_return_temperature') | float(none) %}
        {% if outlet is not none and inlet is not none %}
          {{ (outlet - inlet) | round(1) }}
        {% else %}
          unavailable
        {% endif %}
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

    - name: "HP ODU Power Consumption"
      unique_id: tpl_odu_power_consumption
      # Outdoor unit power: AC current × AC voltage / 1000 for kW
      # Register 118 (current) × Register 119 (voltage)
      state: >-
        {% set current = states('sensor.hp_odu_current') | float(0) %}
        {% set voltage = states('sensor.hp_odu_voltage') | float(0) %}
        {% if current is number and voltage is number %}
          {{ (current * voltage / 1000) | round(2) }}
        {% else %}
          unavailable
        {% endif %}
      unit_of_measurement: "kW"
      device_class: power
      state_class: measurement

    - name: "HP Heat Delivered"
      unique_id: tpl_heat_delivered
      # Heat capacity calculated from flow rate and temperature differential
      # Q[kW] = (flow[m³/h] × density[kg/m³]) / 3600[s/h] × cp[kJ/(kg·K)] × ΔT[K]
      # Q[kW] = (flow / 3600) × 1000 × 4.184 × ΔT / 1000 = (flow / 3600) × 4.184 × ΔT × 1000
      # where: 4.184 = specific heat capacity of water [kJ/(kg·K)], 1000 = density [kg/m³]
      # Register 138 (flow) and water temperature delta
      state: >-
        {% set flow = states('sensor.hp_water_flow') | float(0) %}
        {% set deltaT = states('sensor.hp_water_temperature_delta') | float(0) %}
        {% if flow >= 0 and deltaT >= -30 %}
          {{ max(flow / 3600 * deltaT * 4.184 * 1000, 0) | round(2) }}
        {% else %}
          unavailable
        {% endif %}
      unit_of_measurement: "kW"
      device_class: power
      state_class: measurement

    - name: "HP Calculated COP"
      unique_id: tpl_calculated_cop
      # COP Method 1: heat energy / electrical energy — instantaneous approximation
      # Uses IDU capacity (reg 140) and ODU current × voltage as a rough proxy.
      # For accurate COP, use the energy counters over a time period instead.
      # This is only meaningful when the compressor is running (frequency > 0).
      state: >-
        {% set heat = states('sensor.hp_idu_capacity') | float(0) %}
        {% set elec = (states('sensor.hp_odu_current') | float(0))
                      * (states('sensor.hp_odu_voltage') | float(0)) / 1000 %}
        {% if elec > 0.1 %}
          {{ (heat / elec) | round(2) }}
        {% else %}
          unavailable
        {% endif %}
      unit_of_measurement: ""
      icon: "mdi:heat-pump"

    - name: "HP COP Estimate 2"
      unique_id: tpl_cop_estimate_2
      # COP Method 2: calculated heat delivered / ODU electrical input
      # More accurate than COP1 as it uses dynamically calculated heat output
      # based on actual flow rate and temperature differential.
      # NOTE: Check if heat_delivered is available BEFORE attempting division (prevents division by zero)
      state: >-
        {% set heat = states('sensor.hp_heat_delivered') | float(none) %}
        {% set power = states('sensor.hp_odu_power_consumption') | float(none) %}
        {% if heat is not none and power is not none and power > 0.1 %}
          {{ (heat / power) | round(2) }}
        {% else %}
          unavailable
        {% endif %}
      unit_of_measurement: ""
      icon: "mdi:heat-pump"
