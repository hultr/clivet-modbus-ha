- name: hp_water_flow_idu
  address: 1019
  slave: 1
  input_type: holding
  data_type: uint16
  scale: 0.01
  precision: 2
  unit_of_measurement: "m³/h"
  scan_interval: *scan_interval
  unique_id: hp_water_flow_idu
  # Register 1019 — Water flow rate m³/h from IDU; raw = actual × 100, scale = 0.01

