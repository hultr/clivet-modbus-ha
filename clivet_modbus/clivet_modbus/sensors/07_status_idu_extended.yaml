# IDU extended status registers (1011–1042) — indoor unit detailed telemetry
# scan_interval: 30 seconds
# Note: register 1010 (IDU load output, all bits reserved) is intentionally skipped.
# Note: 0x7F (127) in temperature registers indicates a sensor error.

# ─────────────────────────────────────────────────────────────────────────────
# SCAN INTERVAL — edit the value below to change the poll rate for ALL sensors
# in this file. (YAML anchor; referenced as *scan_interval throughout)
# ─────────────────────────────────────────────────────────────────────────────

- name: hp_t1_primary_outlet
  address: 1011
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: &scan_interval 31   # ← change this value to repoll all sensors in this file
  unique_id: hp_t1_primary_outlet
  # Register 1011 — T1 primary water outlet temperature °C (0x7F = sensor error)

- name: hp_t1b_after_aux_heater
  address: 1012
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: hp_t1b_after_aux_heater
  # Register 1012 — T1B temperature after auxiliary heater °C (0x7F = sensor error)

- name: hp_t2_liquid_refrigerant_idu
  address: 1013
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: hp_t2_liquid_refrigerant_idu
  # Register 1013 — T2 liquid refrigerant temperature °C from IDU (0x7F = sensor error)

- name: hp_t2b_liquid_gas_refrigerant
  address: 1014
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: hp_t2b_liquid_gas_refrigerant
  # Register 1014 — T2B liquid/gas refrigerant temperature °C (0x7F = sensor error)

- name: hp_t5_dhw_idu
  address: 1015
  slave: 1
  input_type: holding
  data_type: int16
  scale: 1
  precision: 0
  unit_of_measurement: "°C"
  device_class: temperature
  scan_interval: *scan_interval
  unique_id: hp_t5_dhw_idu
  # Register 1015 — T5 DHW tank temperature °C from IDU telemetry (0x7F = sensor error)

